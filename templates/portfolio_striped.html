{% extends 'base.html' %}

{% load static %}

{% block content %}

{% include 'loader.html' %}

    <!-- Begin Header -->
    <header>

        <a href="{% url 'home:main' %}" class="logo-container">
            <p>Perspective Perfection</p>
        </a>

{% include 'nav_bar.html' %}

        <a href="#" class="mobile-navigation icon3-list2"></a>

    </header>
    <!-- End Header -->


    <!-- Begin Content -->
    <div class="main-container with-padding">

        <!-- Begin Wrapper -->
        <div class="wrapper">

            <!-- Begin Portfolio -->
            <div class="portfolio-striped">

                <!-- Begin Navigation -->
                <div class="nav">
                    <a href="#" class="prev icon4-leftarrow23"></a>
                    <a href="#" class="next icon4-chevrons"></a>
                </div>
                <!-- End Navigation -->


                <!-- Begin Inner Wrapper -->
                <div class="portfolio-inner">

                    <div class="projects clearfix cols-4">






                {% for profile in profiles %}
                        <div class="project" style="background-image:url({{ profile.stripe.url }});">

                            <div class="overlay">

                                <a href="./{{ profile.name }}"><h5>{{ profile.name }}</h5></a>

                                <div class="cat">
                                    <a href="#">MODELS</a>
                                </div>

                            </div>

                        </div>
                {% endfor %}


                    </div>

                </div>
                <!-- End Inner Wrapper -->

            </div>
            <!-- End Portfolio -->

        </div>
        <!-- End Wrapper -->

    </div>
    <!-- End Content -->
{% endblock content %}
