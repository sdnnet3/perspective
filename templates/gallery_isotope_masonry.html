{% extends 'base.html' %}

{% block content %}

{% include 'loader.html' %}

    <!-- Begin Header -->
    <header>

        <a href="{% url 'home:main' %}" class="logo-container">
            <p>Perspective Perfection</p>
        </a>

{% include 'nav_bar.html' %}

        <a href="#" class="mobile-navigation icon3-list2"></a>

    </header>
    <!-- End Header -->


    <!-- Begin Content -->
    <div class="main-container with-padding">

        <!-- Begin Wrapper -->
        <div class="wrapper">

            <!-- Begin Inner Wrapper -->
            <div class="inner-wrapper">

                <!-- Begin Gallery -->
                <div class="gallery-images masonry style-icons high-space">

                    <div class="row">

                        <div class="col full">

                            <div class="filters clearfix" data-style="scale">

                                <p>FILTERS</p>
                                <a href="#" data-filter="*" class="active">ALL</a>
                                <a href="#" data-filter=".filter-weddings">WEDDINGS</a>
                                <a href="#" data-filter=".filter-families">FAMILIES</a>
                                <a href="#" data-filter=".filter-indoors">INDOORS</a>
                                <a href="#" data-filter=".filter-outdoors">OUTDOORS</a>
                                <a href="#" data-filter=".filter-models">MODELS</a>
                                <a href="#" data-filter=".filter-portraits">PORTRAITS</a>
                                <a href="#" data-filter=".filter-fashion">FASHION</a>

                            </div>
                            
                        </div>

                    </div>
                    
                    
                    
                    <div class="images clearfix cols-4">





                    <!-- Start Images -->
                    {% for photo in photos %}
                        <div class="img 
                        
                        {% if photo.weddings == 1 %}
                            filter-weddings
                        {% endif %}

                        {% if photo.families == 1 %}
                            filter-families
                        {% endif %}

                        {% if photo.indoors == 1 %}
                            filter-indoors
                        {% endif %}

                        {% if photo.outdoors == 1 %}
                            filter-outdoors
                        {% endif %}

                        {% if photo.models == 1 %}
                            filter-models
                        {% endif %}

                        {% if photo.portraits == 1 %}
                            filter-portraits
                        {% endif %}

                        {% if photo.fashion == 1 %}
                            filter-fashion
                        {% endif %}

                        size-regular">

                            <div class="img-cont">
                                
                                <img class="lazy" data-original="{{photo.thumb.url}}" alt="" data-width="475" data-height="370">

                                <div class="overlay">

                                    <a href="{{ photo.full_size.url }}" class="preview icon4-eyeball5" rel="gallery"></a>
                                    <span class="separator"></span>
                                    <a href="#" class="love icon1-heart-empty"></a>
                                    <a href="#" class="love-2 icon1-heart"></a>

                                </div>
                            
                            </div>

                        </div>
                    {% endfor %}
                    <!-- End Images -->





                    </div>

                </div>
                <!-- End Gallery -->

            </div>
            <!-- End Inner Wrapper -->

        </div>
        <!-- End Wrapper -->

    </div>
    <!-- End Content -->
{% endblock content %}
